{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Nelcay Cakey Treats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --cream: #FFFDF5;
            --dark-cocoa: #2C1810;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cream);
            color: var(--dark-cocoa);
        }

        .serif { font-family: 'Playfair Display', serif; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(44, 24, 16, 0.2);
            padding: 10px 0;
            font-size: 1rem;
            color: var(--dark-cocoa);
            transition: border-color 0.3s ease;
            outline: none;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            font-size: 0.9rem;
            color: #888;
            pointer-events: none;
            transition: all 0.3s ease;
            font-weight: 300;
        }

        .input-group input:focus {
            border-bottom-color: var(--gold);
        }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -12px;
            font-size: 0.65rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .image-side {
            background-image: url('https://images.unsplash.com/photo-1586985289688-ca3cf47d3e6e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
        }

        .overlay-gradient {
            background: linear-gradient(to top, rgba(44, 24, 16, 0.3), rgba(212, 175, 55, 0.1));
        }

        .btn-gold {
            background-image: linear-gradient(to right, var(--dark-cocoa) 0%, #4a2c20 51%, var(--dark-cocoa) 100%);
            background-size: 200% auto;
            transition: 0.5s;
        }
        .btn-gold:hover {
            background-position: right center;
            background-image: linear-gradient(to right, var(--gold) 0%, #e5c55d 51%, var(--gold) 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center bg-[#fdfbf7] p-4 md:p-0">

    <div class="w-full h-full md:h-auto md:max-w-[1200px] md:aspect-[16/9] bg-white shadow-2xl flex flex-row-reverse overflow-hidden rounded-none md:rounded-2xl animate-fade-in relative">

        <a href="{% url 'index' %}" class="absolute top-6 left-6 z-20 text-gray-400 hover:text-dark-cocoa transition-colors text-xs uppercase tracking-widest font-bold flex items-center gap-2 flex-row-reverse">
            Close <span class="text-lg">&times;</span>
        </a>

        <div class="hidden md:flex w-1/2 image-side relative flex-col justify-end p-12 text-white text-right">
            <div class="absolute inset-0 overlay-gradient"></div>

            <div class="relative z-10">
                <h3 class="text-2xl font-bold tracking-widest serif mb-2">NELCAY.</h3>
                <p class="text-xs uppercase tracking-[0.3em] opacity-90">Where Memories Are Baked</p>
            </div>
        </div>

        <div class="w-full md:w-1/2 flex flex-col justify-center p-8 md:p-16 lg:p-24 relative overflow-y-auto">

            <div class="mb-10">
                <p class="text-gold text-xs uppercase tracking-[0.2em] font-bold mb-3">Become a Member</p>
                <h2 class="text-4xl md:text-5xl serif text-dark-cocoa leading-tight">Join Our <br><span class="italic">Family</span></h2>
            </div>

            <!-- Error Container -->
            <div id="errorMessage" class="hidden mb-8 py-3 px-4 text-xs uppercase tracking-wide border-l-4 shadow-sm border-red-500 bg-red-50 text-red-700"></div>

            <form id="firebaseRegisterForm" class="space-y-6">

                <div class="input-group">
                    <input type="text" id="username" required placeholder=" ">
                    <label for="username">Username</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-gold text-white px-10 py-4 text-[10px] uppercase tracking-[0.25em] font-bold shadow-lg flex items-center justify-center gap-2 rounded-sm mt-4">
                    <span>Create Account</span>
                </button>
            </form>

            <div class="mt-12 pt-6 border-t border-gray-100 flex justify-center">
                <p class="text-xs text-gray-500 font-light">
                    Already a member? <a href="{% url 'login' %}" class="text-dark-cocoa font-semibold border-b border-gold pb-0.5 hover:text-gold transition-colors">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // --- NELCAY FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyC4GMFz5_naMtMHlqO0SepO-NnLptLHV2M",
            authDomain: "nelcay-web.firebaseapp.com",
            databaseURL: "https://nelcay-web-default-rtdb.firebaseio.com",
            projectId: "nelcay-web",
            storageBucket: "nelcay-web.firebasestorage.app",
            messagingSenderId: "815189958408",
            appId: "1:815189958408:web:82f45f1a1f8acc732b56bd",
            measurementId: "G-X4JDRWDEDE"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Register Handler
        document.getElementById('firebaseRegisterForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMessage');

            // Loading State
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> <span>Creating...</span>';
            errorDiv.classList.add('hidden');

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;

                    // Save additional user info (username) to Realtime Database
                    return database.ref('users/' + user.uid).set({
                        username: username,
                        email: email
                    });
                })
                .then(() => {
                    // Success & Data Saved
                    window.location.href = "{% url 'order' %}";
                })
                .catch((error) => {
                    // Error Handling
                    btn.disabled = false;
                    btn.innerHTML = '<span>Create Account</span>';
                    let msg = error.message;
                    if(error.code === 'auth/email-already-in-use') msg = "This email is already registered.";
                    if(error.code === 'auth/weak-password') msg = "Password must be at least 6 characters.";
                    errorDiv.textContent = msg;
                    errorDiv.classList.remove('hidden');
                });
        });
    </script>

</body>
</html>
